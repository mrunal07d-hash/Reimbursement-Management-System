services:
  # Backend API
  - type: web
    name: reimbursement-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          name: reimbursement-frontend
          type: web
          property: host
    healthCheckPath: /api/health

  # Frontend React App
  - type: web
    name: reimbursement-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: reimbursement-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
